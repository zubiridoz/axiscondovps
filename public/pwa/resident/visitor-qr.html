<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>Pases de Acceso — AxisCondo</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-inner">
                <span class="header-title">Accesos y Códigos QR</span>
                <button onclick="Auth.logout()" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="content">
            <div class="card">
                <div class="section-title" style="margin-bottom:16px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                    Generar Pase de Visita
                </div>
                <div id="msg" class="alert"></div>
                <form id="frmInvite">
                    <div class="form-group">
                        <label>Nombre del Visitante</label>
                        <input type="text" id="visitor_name" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Estimada de Llegada</label>
                        <input type="datetime-local" id="arrival_date" required>
                    </div>
                    <button type="submit" class="btn" id="btnSubmit">Generar Pase</button>
                </form>
            </div>

            <!-- QR Result -->
            <div id="qr-result" class="card text-center" style="display:none; border:1px solid var(--success);">
                <h4 class="text-success" style="margin-bottom:12px;">¡Pase Generado!</h4>
                <div id="qr-container"></div>
                <p class="text-sm text-muted" style="margin-top:12px;">Muestra este código al guardia en caseta.</p>
                <button class="btn" onclick="shareQr()" style="background:var(--success); box-shadow:0 4px 12px rgba(16,185,129,0.3);">Compartir QR</button>
            </div>

            <div class="section-title mt-2">Pases Activos / Historial</div>
            <div id="invitations-list">
                <div class="card" style="height:70px;"><div class="skeleton" style="width:50%;height:14px;margin-bottom:8px;"></div><div class="skeleton" style="width:30%;height:12px;"></div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="dashboard.html">
                <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Inicio
            </a>
            <a href="account.html">
                <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="10" x2="22" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Finanzas
            </a>
            <a href="amenities.html">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Reservas
            </a>
            <a href="visitor-qr.html" class="active">
                <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Accesos
            </a>
            <a href="tickets.html">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="8" x2="12" y2="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Ayuda
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();
        let currentShareData = null;

        async function loadInvitations() {
            const res = await ApiClient.request('/resident/visitor-invitations');
            const list = document.getElementById('invitations-list');
            
            if (res && res.status === 'success') {
                if(res.data.invitations.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                            <p>No has generado pases recientes.</p>
                        </div>`;
                    return;
                }

                let html = '';
                res.data.invitations.forEach(inv => {
                    const statusClass = inv.status === 'used' ? 'success' : (inv.status === 'expired' ? 'urgent' : 'info');
                    const statusLabel = inv.status === 'used' ? 'Usado' : (inv.status === 'expired' ? 'Expirado' : 'Activo');

                    html += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                                <strong style="font-size:14px;">${inv.visitor_name}</strong>
                                <span class="badge ${statusClass}">${statusLabel}</span>
                            </div>
                            <p class="text-sm text-muted">${inv.expected_arrival_date.substring(0,16)}</p>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `<div class="empty-state"><p>No se pudieron cargar los pases.</p></div>`;
            }
        }

        document.getElementById('frmInvite').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const msg = document.getElementById('msg');
            const qrWrapper = document.getElementById('qr-result');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Generando...';
            msg.style.display = 'none';
            qrWrapper.style.display = 'none';

            const payload = {
                visitor_name: document.getElementById('visitor_name').value,
                expected_arrival_date: document.getElementById('arrival_date').value.replace('T', ' ') + ':00'
            };

            const res = await ApiClient.request('/resident/visitor-invitations', 'POST', payload);

            if (res && res.status === 'success') {
                msg.className = 'alert success';
                msg.innerText = res.data.message || 'Pase generado exitosamente';
                msg.style.display = 'block';
                document.getElementById('frmInvite').reset();
                
                qrWrapper.style.display = 'block';
                const qrContainer = document.getElementById('qr-container');
                qrContainer.innerHTML = '';
                
                new QRCode(qrContainer, {
                    text: res.data.qr_token,
                    width: 200,
                    height: 200,
                    colorDark: "#0F172A",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                currentShareData = {
                    title: 'Pase de Acceso AxisCondo',
                    text: `Tu pase de acceso: ${res.data.qr_token}\nMuestra el QR en la caseta.`,
                };

                loadInvitations();
            } else {
                msg.className = 'alert error';
                msg.innerText = res ? res.message : 'Error desconocido';
                msg.style.display = 'block';
            }
            btn.disabled = false;
            btn.innerText = 'Generar Pase';
        });

        function shareQr() {
            if (navigator.share && currentShareData) {
                navigator.share(currentShareData).catch(() => {});
            } else {
                alert("Tu dispositivo no soporta compartición nativa. Toma captura de pantalla del QR.");
            }
        }

        window.onload = loadInvitations;
    </script>
</body>
</html>
