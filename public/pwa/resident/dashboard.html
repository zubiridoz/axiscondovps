<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>AxisCondo — Inicio</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-inner">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="avatar" id="user-avatar">—</div>
                    <div>
                        <div class="header-title" id="welcome-msg">Cargando...</div>
                        <div style="font-size:12px; opacity:0.7;">Mi Comunidad</div>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="content">
            <!-- Quick Actions Grid -->
            <div class="section-title" style="margin-top:4px;">Acceso Rápido</div>
            <div class="quick-grid">
                <a href="account.html" class="quick-card">
                    <div class="icon-wrap" style="background:rgba(79,70,229,0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m2 10 20 0"/></svg>
                    </div>
                    <span>Estado de Cuenta</span>
                </a>
                <a href="amenities.html" class="quick-card">
                    <div class="icon-wrap" style="background:rgba(6,182,212,0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#06B6D4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/></svg>
                    </div>
                    <span>Reservar Amenidad</span>
                </a>
                <a href="visitor-qr.html" class="quick-card">
                    <div class="icon-wrap" style="background:rgba(16,185,129,0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                    </div>
                    <span>Invitar Visitante</span>
                </a>
                <a href="tickets.html" class="quick-card">
                    <div class="icon-wrap" style="background:rgba(245,158,11,0.1);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>
                    </div>
                    <span>Reportar Problema</span>
                </a>
            </div>

            <!-- Announcements -->
            <div class="section-title">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
                Últimos Anuncios
            </div>
            <div id="announcements-list">
                <div class="card" style="height:80px;"><div class="skeleton" style="width:60%;height:14px;margin-bottom:10px;"></div><div class="skeleton" style="width:90%;height:12px;"></div></div>
                <div class="card" style="height:80px;"><div class="skeleton" style="width:50%;height:14px;margin-bottom:10px;"></div><div class="skeleton" style="width:80%;height:12px;"></div></div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="dashboard.html" class="active">
                <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Inicio
            </a>
            <a href="account.html">
                <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="10" x2="22" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Finanzas
            </a>
            <a href="amenities.html">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Reservas
            </a>
            <a href="visitor-qr.html">
                <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Accesos
            </a>
            <a href="tickets.html">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="8" x2="12" y2="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Ayuda
            </a>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();

        const user = Auth.getUser();
        const firstName = user.first_name || 'Residente';
        document.getElementById('welcome-msg').innerText = `Hola, ${firstName}`;
        document.getElementById('user-avatar').innerText = firstName.charAt(0).toUpperCase();

        async function loadDashboardData() {
            const res = await ApiClient.request('/resident/announcements');
            const list = document.getElementById('announcements-list');
            
            if (res && res.status === 'success') {
                if(res.data.announcements.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m3 11 18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
                            </svg>
                            <p>No hay anuncios activos en tu comunidad.</p>
                        </div>`;
                    return;
                }

                let html = '';
                res.data.announcements.forEach(a => {
                    const badge = a.type === 'urgent' 
                        ? '<span class="badge urgent">URGENTE</span> ' 
                        : '<span class="badge info">Aviso</span> ';
                    html += `
                        <div class="card">
                            <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                                ${badge}
                                <small class="text-muted">${a.created_at.substring(0,10)}</small>
                            </div>
                            <h4 style="font-size:15px; font-weight:600; margin-bottom:6px;">${a.title}</h4>
                            <p style="font-size:13px; color:var(--text-secondary); line-height:1.5;">${a.content}</p>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m3 11 18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
                        </svg>
                        <p>No hay anuncios activos en tu comunidad.</p>
                    </div>`;
            }
        }

        window.onload = loadDashboardData;
    </script>
</body>
</html>
