<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>Reservas — AxisCondo</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-inner">
                <span class="header-title">Reservas de Áreas Comunes</span>
                <button onclick="Auth.logout()" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="content">
            <div class="card">
                <div class="section-title" style="margin-bottom:16px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Hacer una Reserva
                </div>
                <div id="msg" class="alert"></div>
                
                <form id="frmBooking">
                    <div class="form-group">
                        <label>Amenidad</label>
                        <select id="amenity_id" required>
                            <option value="">Seleccione...</option>
                            <option value="1">Alberca Torre A</option>
                            <option value="2">Asador 1</option>
                            <option value="3">Salón de Eventos Múltiples</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Inicio</label>
                        <input type="datetime-local" id="start_time" required>
                    </div>
                    <div class="form-group">
                        <label>Término</label>
                        <input type="datetime-local" id="end_time" required>
                    </div>
                    <button type="submit" class="btn" id="btnSubmit">Solicitar Reserva</button>
                </form>
            </div>

            <div class="section-title mt-2">Mis Próximas Reservas</div>
            <div id="bookings-list">
                <div class="card" style="height:60px;"><div class="skeleton" style="width:50%;height:14px;margin-bottom:8px;"></div><div class="skeleton" style="width:30%;height:12px;"></div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="dashboard.html">
                <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Inicio
            </a>
            <a href="account.html">
                <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="10" x2="22" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Finanzas
            </a>
            <a href="amenities.html" class="active">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Reservas
            </a>
            <a href="visitor-qr.html">
                <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Accesos
            </a>
            <a href="tickets.html">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="8" x2="12" y2="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Ayuda
            </a>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();

        async function loadBookings() {
            const res = await ApiClient.request('/resident/bookings');
            const list = document.getElementById('bookings-list');
            
            if (res && res.status === 'success') {
                if(res.data.bookings.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            <p>No tienes reservas activas.</p>
                        </div>`;
                    return;
                }

                let html = '';
                res.data.bookings.forEach(b => {
                    const statusClass = b.status === 'approved' ? 'success' : (b.status === 'cancelled' ? 'urgent' : 'info');
                    const statusLabel = b.status === 'approved' ? 'Aprobada' : (b.status === 'cancelled' ? 'Cancelada' : 'Pendiente');

                    html += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                                <strong style="font-size:14px;">Amenidad #${b.amenity_id}</strong>
                                <span class="badge ${statusClass}">${statusLabel}</span>
                            </div>
                            <p class="text-sm text-muted">Desde: ${b.start_time.replace('T', ' ')}</p>
                            <p class="text-sm text-muted">Hasta: ${b.end_time.replace('T', ' ')}</p>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `<div class="empty-state"><p>No se pudieron cargar las reservas.</p></div>`;
            }
        }

        document.getElementById('frmBooking').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Procesando...';
            msg.style.display = 'none';

            const s = document.getElementById('start_time').value.replace('T', ' ') + ':00';
            const eT = document.getElementById('end_time').value.replace('T', ' ') + ':00';

            const payload = {
                amenity_id: document.getElementById('amenity_id').value,
                start_time: s,
                end_time: eT
            };

            const res = await ApiClient.request('/resident/bookings', 'POST', payload);

            if (res && res.status === 'success') {
                msg.className = 'alert success';
                msg.innerText = res.data.message || 'Reserva creada exitosamente';
                msg.style.display = 'block';
                document.getElementById('frmBooking').reset();
                loadBookings();
            } else {
                msg.className = 'alert error';
                msg.innerText = res ? res.message : 'Error desconocido';
                msg.style.display = 'block';
            }
            btn.disabled = false;
            btn.innerText = 'Solicitar Reserva';
        });

        window.onload = loadBookings;
    </script>
</body>
</html>
