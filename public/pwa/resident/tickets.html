<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>Mesa de Ayuda — AxisCondo</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-inner">
                <span class="header-title">Mesa de Ayuda</span>
                <button onclick="Auth.logout()" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="content">
            <div class="card">
                <div class="section-title" style="margin-bottom:16px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>
                    Nuevo Reporte
                </div>
                <div id="msg" class="alert"></div>
                <form id="frmTicket">
                    <div class="form-group">
                        <label>Asunto</label>
                        <input type="text" id="subject" placeholder="Ej: Fuga de agua en pasillo" required>
                    </div>
                    <div class="form-group">
                        <label>Descripción detallada</label>
                        <textarea id="description" rows="3" placeholder="Describe el problema con el mayor detalle posible..." required></textarea>
                    </div>
                    <button type="submit" class="btn" id="btnSubmit">Enviar Reporte</button>
                </form>
            </div>

            <div class="section-title mt-2">Mis Tickets Anteriores</div>
            <div id="tickets-list">
                <div class="card" style="height:70px;"><div class="skeleton" style="width:50%;height:14px;margin-bottom:8px;"></div><div class="skeleton" style="width:80%;height:12px;"></div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="dashboard.html">
                <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Inicio
            </a>
            <a href="account.html">
                <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="10" x2="22" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Finanzas
            </a>
            <a href="amenities.html">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Reservas
            </a>
            <a href="visitor-qr.html">
                <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Accesos
            </a>
            <a href="tickets.html" class="active">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="8" x2="12" y2="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Ayuda
            </a>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();

        async function loadTickets() {
            const res = await ApiClient.request('/resident/tickets');
            const list = document.getElementById('tickets-list');
            
            if (res && res.status === 'success') {
                if(res.data.tickets.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>
                            <p>No has abierto ningún ticket.</p>
                        </div>`;
                    return;
                }

                let html = '';
                res.data.tickets.forEach(t => {
                    const statusClass = t.status === 'closed' ? 'success' : (t.status === 'open' ? 'urgent' : 'info');
                    const statusLabel = t.status === 'closed' ? 'Cerrado' : (t.status === 'open' ? 'Abierto' : 'En Proceso');

                    html += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                                <strong style="font-size:14px;">${t.subject}</strong>
                                <span class="badge ${statusClass}">${statusLabel}</span>
                            </div>
                            <p class="text-sm" style="color:var(--text-secondary); margin-bottom:6px;">${t.description}</p>
                            <small class="text-muted">${t.created_at.substring(0,16)}</small>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `<div class="empty-state"><p>No se pudieron cargar los tickets.</p></div>`;
            }
        }

        document.getElementById('frmTicket').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Enviando...';
            msg.style.display = 'none';

            const payload = {
                subject: document.getElementById('subject').value,
                description: document.getElementById('description').value
            };

            const res = await ApiClient.request('/resident/tickets', 'POST', payload);

            if (res && res.status === 'success') {
                msg.className = 'alert success';
                msg.innerText = res.data.message || 'Ticket creado exitosamente';
                msg.style.display = 'block';
                document.getElementById('frmTicket').reset();
                loadTickets();
            } else {
                msg.className = 'alert error';
                msg.innerText = res ? res.message : 'Error desconocido';
                msg.style.display = 'block';
            }
            btn.disabled = false;
            btn.innerText = 'Enviar Reporte';
        });

        window.onload = loadTickets;
    </script>
</body>
</html>
