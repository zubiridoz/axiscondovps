<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>Estado de Cuenta — AxisCondo</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-inner">
                <span class="header-title">Estado de Cuenta</span>
                <button onclick="Auth.logout()" class="btn-logout">Salir</button>
            </div>
        </header>

        <div class="content">
            <div class="card" style="background:var(--gradient-header); color:white; text-align:center; border:none;">
                <p style="font-size:13px; opacity:0.8; margin-bottom:4px;">Deuda Total Estimada</p>
                <h1 id="total-debt" style="font-size:32px; font-weight:700; margin:4px 0;">$0.00</h1>
                <small style="opacity:0.6; font-size:11px;">Actualizado en tiempo real</small>
            </div>

            <div class="section-title mt-2">Movimientos Recientes</div>
            <div id="transactions-list">
                <div class="card" style="height:60px;"><div class="skeleton" style="width:50%;height:14px;margin-bottom:8px;"></div><div class="skeleton" style="width:30%;height:12px;"></div></div>
                <div class="card" style="height:60px;"><div class="skeleton" style="width:60%;height:14px;margin-bottom:8px;"></div><div class="skeleton" style="width:35%;height:12px;"></div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="dashboard.html">
                <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Inicio
            </a>
            <a href="account.html" class="active">
                <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="10" x2="22" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Finanzas
            </a>
            <a href="amenities.html">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Reservas
            </a>
            <a href="visitor-qr.html">
                <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Accesos
            </a>
            <a href="tickets.html">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="8" x2="12" y2="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Ayuda
            </a>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();

        async function loadFinances() {
            const res = await ApiClient.request('/resident/account-statement');
            const totalTitle = document.getElementById('total-debt');
            const list = document.getElementById('transactions-list');
            
            if (res && res.status === 'success') {
                totalTitle.innerText = `$${parseFloat(res.data.total_debt).toFixed(2)}`;
                
                if(res.data.transactions.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20m5-17H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H7"/></svg>
                            <p>¡Estás al día! No tienes movimientos.</p>
                        </div>`;
                    return;
                }

                let html = '';
                res.data.transactions.forEach(t => {
                    const isCharge = t.type === 'charge';
                    const color = isCharge ? 'var(--danger)' : 'var(--success)';
                    const sign = isCharge ? '-' : '+';
                    const statusClass = t.status === 'paid' ? 'success' : 'urgent';
                    const statusText = t.status === 'paid' ? 'Pagado' : 'Pendiente';

                    html += `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong style="font-size:14px;">${t.description}</strong>
                                <div style="margin-top:4px;">
                                    <small class="text-muted">${t.created_at.substring(0,10)}</small>
                                    <span class="badge ${statusClass}" style="margin-left:6px;">${statusText}</span>
                                </div>
                            </div>
                            <div style="font-weight:700; color:${color}; font-size:16px;">
                                ${sign}$${parseFloat(t.amount).toFixed(2)}
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20m5-17H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H7"/></svg>
                        <p>No se pudo cargar la información financiera.</p>
                    </div>`;
            }
        }

        window.onload = loadFinances;
    </script>
</body>
</html>
