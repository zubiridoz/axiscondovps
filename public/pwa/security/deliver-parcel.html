<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Entregar Paquete - AxisCondo</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .content {
            padding-bottom: 100px;
        }
        .resident-input {
            width: 100%;
            min-width: 150px;
            padding: 6px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            color: #1a1a2e;
            background-color: #f8fafc;
            outline: none;
            box-sizing: border-box;
            text-align: right;
            font-family: inherit;
        }
        .resident-input:focus {
            border-color: #0266e6;
            background-color: #fff;
        }
        .resident-input::placeholder {
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header style="justify-content: flex-start; position: relative;">
            <a href="paqueteria.html"
                style="color:var(--navy); text-decoration:none; display:flex; align-items:center; gap:4px; font-weight:500; font-size:16px;">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Atrás
            </a>
            <span
                style="position:absolute; left:50%; transform:translateX(-50%); font-weight:700; font-size:17px; color:var(--navy);">
                Entregar paquete
            </span>
        </header>

        <div class="content">
            <!-- Toast -->
            <div class="toast" id="toast"></div>

            <!-- Search Bar -->
            <div class="search-bar-wrapper">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchParcels"
                    placeholder="Buscar paquetes por unidad, residente o transportista">
            </div>

            <!-- Hero Banner -->

            <div id="parcelsList">
                <div style="padding:40px; text-align:center; color:#94a3b8;">Cargando...</div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="unidades.html">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Unidades
            </a>
            <a href="entradas.html">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Entradas
            </a>
            <a href="paqueteria.html" class="active">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                    </path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                Paquetería
            </a>
            <a href="configuracion.html">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                Configuración
            </a>
        </div>
    </div>

    <!-- Deliver Detail Modal -->
    <div class="deliver-modal" id="deliverModal">
        <div class="deliver-modal-header">
            <span class="title">Entregar paquete</span>
            <span class="close-btn" id="btnCloseDeliver">Cerrar</span>
        </div>
        <div class="deliver-modal-body">
            <img class="deliver-photo" id="deliverPhoto" src="" alt="Paquete">

            <div class="deliver-details-card">
                <div class="deliver-detail-row">
                    <span class="dd-label">Unidad</span>
                    <span class="dd-value filled" id="deliverUnit">—</span>
                </div>
                <div class="deliver-detail-row">
                    <span class="dd-label">Paquetes</span>
                    <span class="dd-value filled" id="deliverQty">1</span>
                </div>
                <div class="deliver-detail-row">
                    <span class="dd-label">Proveedor de paquetería</span>
                    <span class="dd-value filled" id="deliverCourier">—</span>
                </div>
                <div class="deliver-detail-row">
                    <span class="dd-label">Recogido Por</span>
                    <span class="dd-value">
                        <select id="residentSelect">
                            <option value="">Seleccionar ◇</option>
                        </select>
                        <input type="text" id="manualNameInput" class="resident-input" placeholder="Nombre completo" style="display: none;">
                    </span>
                </div>
            </div>

            <!-- "Seleccionar residente" button -->
            <button class="btn-select-resident" id="btnSelectResident">Seleccionar residente</button>

            <!-- Signature Section (hidden until resident is selected) -->
            <div class="signature-section" id="signatureSection">
                <div class="signature-canvas-wrapper">
                    <canvas id="signatureCanvas"></canvas>
                </div>
                <div class="signature-label">Firme aquí</div>
                <div class="signature-actions">
                    <button class="btn-clear-sig" id="btnClearSig">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                        </svg>
                        Limpiar
                    </button>
                    <button class="btn-deliver" id="btnDeliver">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        Entregar paquete
                    </button>
                </div>
            </div>

            <button class="btn-close-modal" id="btnCloseDeliverBottom">Cerrar</button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();

        let allParcels = [];
        let currentParcel = null;

        // ============================
        // UTILITIES
        // ============================
        const getPhotoUrl = (photoPath) => {
            if (!photoPath) return '';
            const fileName = photoPath.split('/').pop();
            return `${CONFIG.API_URL}/security/parcel-photo/${fileName}`;
        };

        const formatDateTime = (dateStr) => {
            const d = new Date(dateStr);
            const days = ['dom', 'lun', 'mar', 'mié', 'jue', 'vie', 'sáb'];
            const months = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
            let hours = d.getHours();
            const minutes = d.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'p.m.' : 'a.m.';
            hours = hours % 12 || 12;
            return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} · ${hours}:${minutes} ${ampm}`;
        };

        const showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // ============================
        // LOAD PENDING PARCELS
        // ============================
        const loadPendingParcels = async () => {
            const container = document.getElementById('parcelsList');

            try {
                const res = await ApiClient.request('/security/parcels/pending', 'GET');

                if (res && res.status === 'success') {
                    allParcels = res.data.parcels || [];
                    renderParcels(allParcels);
                }
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div style="padding:40px; text-align:center; color:red;">Error al cargar paquetes</div>';
            }
        };

        const renderParcels = (parcels) => {
            const container = document.getElementById('parcelsList');

            if (!parcels || parcels.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <h3>Recuéstate y relájate</h3>
                        <p>Actualmente no hay paquetes para entregar. Una vez que haya paquetes para entregar, aparecerán aquí.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            parcels.forEach(p => {
                const photoUrl = getPhotoUrl(p.photo_url);
                const card = document.createElement('div');
                card.className = 'parcel-card';
                card.innerHTML = `
                    ${photoUrl ? `<img class="parcel-thumb" src="${photoUrl}" alt="Paquete">` : '<div class="parcel-thumb"></div>'}
                    <div class="parcel-info">
                        <div class="parcel-unit">${p.unit_number || 'N/A'}</div>
                        <div class="parcel-courier">
                            <svg viewBox="0 0 24 24" style="width:14px; height:14px; stroke:var(--primary); fill:none; stroke-width:2;">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            </svg>
                            ${p.courier || 'Desconocido'}
                        </div>
                        <div class="parcel-meta">
                            <span>${formatDateTime(p.created_at)}</span>
                            <span>×${p.quantity || 1}</span>
                        </div>
                    </div>
                    ${(p.quantity && p.quantity > 1) ? `<span class="parcel-qty-badge">${p.quantity} paq.</span>` : ''}
                    <svg class="arrow" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                `;
                card.addEventListener('click', () => openDeliverModal(p));
                container.appendChild(card);
            });
        };

        // ============================
        // SEARCH FILTER
        // ============================
        document.getElementById('searchParcels').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (!q) {
                renderParcels(allParcels);
                return;
            }
            const filtered = allParcels.filter(p => {
                const str = `${p.unit_number} ${p.courier} ${p.resident_names} ${p.section_name}`.toLowerCase();
                return str.includes(q);
            });
            renderParcels(filtered);
        });

        // ============================
        // DELIVER MODAL
        // ============================
        const deliverModal = document.getElementById('deliverModal');
        const signatureSection = document.getElementById('signatureSection');
        const btnDeliver = document.getElementById('btnDeliver');

        const openDeliverModal = (parcel) => {
            currentParcel = parcel;

            // Set photo
            const photoUrl = getPhotoUrl(parcel.photo_url);
            document.getElementById('deliverPhoto').src = photoUrl || '';

            // Set details
            document.getElementById('deliverUnit').textContent = parcel.unit_number || 'N/A';
            document.getElementById('deliverQty').textContent = parcel.quantity || 1;
            document.getElementById('deliverCourier').textContent = parcel.courier || '—';

            // Populate resident dropdown
            const select = document.getElementById('residentSelect');
            const manualInput = document.getElementById('manualNameInput');
            const btnSelectResident = document.getElementById('btnSelectResident');
            
            select.innerHTML = '<option value="">Seleccionar ◇</option>';
            select.className = '';
            
            manualInput.value = '';
            manualInput.className = 'resident-input';

            if (parcel.residents && parcel.residents.length > 0) {
                select.style.display = 'inline-block';
                manualInput.style.display = 'none';
                btnSelectResident.style.display = 'block';
                
                parcel.residents.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.user_id;
                    opt.textContent = r.name + ' ◇';
                    opt.dataset.name = r.name;
                    select.appendChild(opt);
                });
            } else {
                select.style.display = 'none';
                manualInput.style.display = 'block';
                btnSelectResident.style.display = 'none';
                
                // Set name if available in comment/extra but since it's manual we leave it blank
            }

            // Reset state
            signatureSection.classList.remove('visible');
            btnDeliver.classList.remove('active');
            document.getElementById('btnSelectResident').style.display = 'block';
            clearSignature();

            deliverModal.classList.add('active');
        };

        // Close modal
        document.getElementById('btnCloseDeliver').addEventListener('click', () => {
            deliverModal.classList.remove('active');
        });
        document.getElementById('btnCloseDeliverBottom').addEventListener('click', () => {
            deliverModal.classList.remove('active');
        });

        // "Seleccionar residente" button — focuses the select dropdown
        document.getElementById('btnSelectResident').addEventListener('click', () => {
            const select = document.getElementById('residentSelect');
            // Trigger native dropdown
            if (typeof select.showPicker === 'function') {
                try { select.showPicker(); } catch (e) { select.focus(); }
            } else {
                select.focus();
            }
        });

        // When resident is selected, show signature section
        document.getElementById('residentSelect').addEventListener('change', function () {
            if (this.value) {
                this.className = 'filled';
                signatureSection.classList.add('visible');
                document.getElementById('btnSelectResident').style.display = 'none';
                clearSignature();
                // Scroll to signature
                setTimeout(() => {
                    signatureSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 200);
            } else {
                this.className = '';
                signatureSection.classList.remove('visible');
                document.getElementById('btnSelectResident').style.display = 'block';
                btnDeliver.classList.remove('active');
            }
        });

        // When manual name input changes, show signature if not empty
        document.getElementById('manualNameInput').addEventListener('input', function () {
            if (this.value.trim().length > 0) {
                this.className = 'resident-input filled';
                signatureSection.classList.add('visible');
                clearSignature();
                // We delay scrolling slightly depending on how the keyboard affects the layout, but mostly okay.
            } else {
                this.className = 'resident-input';
                signatureSection.classList.remove('visible');
                btnDeliver.classList.remove('active');
            }
        });

        // ============================
        // SIGNATURE CANVAS
        // ============================
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let hasDrawn = false;

        const initCanvas = () => {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        };

        // Use ResizeObserver to handle canvas sizing after modal is shown
        const resizeObserver = new ResizeObserver(() => {
            if (deliverModal.classList.contains('active') && signatureSection.classList.contains('visible')) {
                initCanvas();
            }
        });
        resizeObserver.observe(canvas);

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        };

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            hasDrawn = true;
            btnDeliver.classList.add('active');
        });

        canvas.addEventListener('mouseup', () => { isDrawing = false; });
        canvas.addEventListener('mouseleave', () => { isDrawing = false; });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            hasDrawn = true;
            btnDeliver.classList.add('active');
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isDrawing = false; });

        const clearSignature = () => {
            const rect = canvas.getBoundingClientRect();
            if (rect.width > 0) {
                canvas.width = rect.width * 2;
                canvas.height = rect.height * 2;
                ctx.scale(2, 2);
                ctx.strokeStyle = '#1a1a2e';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }
            hasDrawn = false;
            btnDeliver.classList.remove('active');
        };

        document.getElementById('btnClearSig').addEventListener('click', clearSignature);

        // ============================
        // DELIVER SUBMIT
        // ============================
        document.getElementById('btnDeliver').addEventListener('click', async () => {
            if (!currentParcel || !hasDrawn) return;

            let pickedUpName = '';
            let pickedUpBy = '';

            if (currentParcel.residents && currentParcel.residents.length > 0) {
                const select = document.getElementById('residentSelect');
                const selectedOption = select.options[select.selectedIndex];
                pickedUpName = selectedOption.dataset.name || selectedOption.textContent.replace(' ◇', '');
                pickedUpBy = select.value;
                if (!pickedUpBy) return;
            } else {
                const manualInput = document.getElementById('manualNameInput');
                pickedUpName = manualInput.value.trim();
                pickedUpBy = ''; // No user id
                if (!pickedUpName) {
                    showToast('Por favor ingrese el nombre de quien recibe');
                    return;
                }
            }

            // Get signature as base64
            const signatureData = canvas.toDataURL('image/png');

            const btn = document.getElementById('btnDeliver');
            const origHTML = btn.innerHTML;
            btn.innerHTML = '<span>Entregando...</span>';
            btn.classList.remove('active');

            try {
                const token = Auth.getToken();
                const body = new URLSearchParams();
                body.append('picked_up_by', pickedUpBy);
                body.append('picked_up_name', pickedUpName);
                body.append('signature', signatureData);

                const resRaw = await fetch(`${CONFIG.API_URL}/security/parcels/${currentParcel.id}/deliver`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: body.toString()
                });
                const res = await resRaw.json();

                if (resRaw.ok && res && res.status === 'success') {
                    deliverModal.classList.remove('active');
                    showToast('Paquete entregado');
                    // Reload list
                    loadPendingParcels();
                } else {
                    alert(res ? res.message : 'Error al entregar paquete');
                }
            } catch (err) {
                console.error(err);
                alert('Error de conexión');
            } finally {
                btn.innerHTML = origHTML;
                btn.classList.add('active');
            }
        });

        // ============================
        // INIT
        // ============================
        loadPendingParcels();
    </script>
</body>

</html>
