<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Registros de Seguridad - AxisCondo</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Month/Year selector */
        .period-selector {
            background: white; border-radius: 12px; margin: 16px 20px;
            padding: 14px 16px; display: flex; align-items: center; justify-content: center;
            gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .period-selector select {
            border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px;
            font-size: 15px; font-weight: 600; color: var(--navy);
            background: white; cursor: pointer;
        }

        /* Entry Log Card */
        .log-card {
            background: white; border-radius: 12px; margin: 0 20px 12px;
            padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; gap: 12px; cursor: pointer;
            border-left: 4px solid #22c55e; transition: transform 0.15s;
        }
        .log-card:active { transform: scale(0.98); }
        .log-card.no-exit { border-left-color: #f59e0b; }

        .log-card-body { flex: 1; }
        .log-card-body .name { font-size: 16px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
        .log-card-body .vehicle-line {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--text-muted); margin-bottom: 4px;
        }
        .log-card-body .vehicle-line svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
        .log-card-body .unit { font-size: 14px; color: var(--primary); font-weight: 600; margin-bottom: 6px; }
        .log-card-body .times {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-muted); flex-wrap: wrap;
        }
        .log-card-body .times svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
        .log-card-body .times .entry-time { color: var(--text-main); }
        .log-card-body .times .exit-time { color: #7c3aed; font-weight: 600; }
        .log-card-body .times .ago { font-size: 12px; color: var(--text-muted); }
        .log-card-body .times .duration {
            display: flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--text-muted);
        }
        .log-card-body .times .duration svg { width: 12px; height: 12px; }

        .log-card-right {
            display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
            flex-shrink: 0;
        }
        .log-card-right .thumb {
            width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
        }
        .log-card-right .visit-badge {
            color: var(--primary); font-size: 13px; font-weight: 600;
        }

        /* Detail overlay */
        .log-detail-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--bg-main);
            display: none; flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        .log-detail-overlay.active { display: flex; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .log-detail-header {
            background: #f8fafc; padding: 14px 20px;
            display: flex; align-items: center; justify-content: flex-start;
            border-bottom: 1px solid #e2e8f0;
        }
        .log-detail-header .close-link {
            color: var(--navy); text-decoration: none; font-size: 15px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
        }
        .log-detail-body {
            flex: 1; overflow-y: auto; padding: 16px 0 100px;
        }

        .log-detail-card {
            background: white; border-radius: 12px; margin: 0 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden;
        }
        .log-detail-card .card-title {
            padding: 14px 16px 0; font-size: 16px; font-weight: 700; color: var(--navy);
        }
        .ld-row {
            display: flex; align-items: center; padding: 12px 16px; gap: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .ld-row:last-child { border-bottom: none; }
        .ld-row svg { width: 18px; height: 18px; stroke: var(--text-muted); fill: none; stroke-width: 2; flex-shrink: 0; }
        .ld-row .ld-label { flex: 1; font-size: 14px; color: var(--text-main); }
        .ld-row .ld-value { font-weight: 600; font-size: 14px; color: var(--navy); }
        .ld-row .ld-value.pill { background: #dbeafe; color: var(--primary); padding: 3px 10px; border-radius: 10px; font-size: 12px; }

        .ld-photo-section {
            background: white; border-radius: 12px; margin: 0 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden;
        }
        .ld-photo-label {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px 12px;
        }
        .ld-photo-label .left { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--navy); }
        .ld-photo-label .left svg { width: 14px; height: 14px; stroke: #3b82f6; fill: none; stroke-width: 2.5; }
        .ld-photo-label .right { color: #10b981; background: #ecfdf5; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: capitalize; }
        .ld-photo-section img {
            width: calc(100% - 32px); margin: 0 16px 16px; border-radius: 8px;
            object-fit: cover; max-height: 400px;
        }

        /* Empty list */
        .empty-log-state {
            text-align: center; padding: 60px 30px; color: var(--text-muted);
        }
        .empty-log-state svg { width: 48px; height: 48px; stroke: #cbd5e1; fill: none; stroke-width: 1.5; margin-bottom: 12px; }
        .empty-log-state p { font-size: 15px; }

        /* Toast */
        .toast-log {
            position: fixed; top: 0; left: 0; right: 0; z-index: 5000;
            background: #22c55e; color: white; padding: 16px 20px;
            font-weight: 600; font-size: 16px;
            transform: translateY(-100%); transition: transform 0.4s ease;
        }
        .toast-log.show { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Toast -->
        <div class="toast-log" id="toast-log">Salida registrada exitosamente</div>
        <header>
            <a href="entradas.html" style="color:var(--navy); text-decoration:none; font-size:16px; display:flex; align-items:center; gap:4px;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Atrás
            </a>
            <span>Registros de entrada y salida</span>
            <div style="width:50px;"></div>
        </header>

        <div class="content">
            <!-- Period Selector -->
            <div class="period-selector">
                <select id="selMonth"></select>
                <select id="selYear"></select>
            </div>

            <div id="logs-list">
                <div class="empty-log-state"><p>Cargando registros...</p></div>
            </div>
        </div>

        <!-- ===== DETAIL OVERLAY ===== -->
        <div class="log-detail-overlay" id="logDetailOverlay">
            <div class="log-detail-header">
                <span class="close-link" onclick="closeLogDetail()">Cerrar</span>
            </div>
            <div class="log-detail-body" id="logDetailBody"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav" id="bottomNav">
            <a href="unidades.html">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Unidades
            </a>
            <a href="entradas.html" class="active">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Entradas
            </a>
            <a href="paqueteria.html">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Paquetería
            </a>
            <a href="configuracion.html">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Configuración
            </a>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        Auth.checkProtected();

        const basePath = window.location.origin + window.location.pathname.substring(0, window.location.pathname.indexOf('/public/')) + '/public/';
        const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

        // ===================
        // INIT SELECTORS
        // ===================
        const selMonth = document.getElementById('selMonth');
        const selYear = document.getElementById('selYear');
        const now = new Date();

        monthNames.forEach((m, i) => {
            const opt = document.createElement('option');
            opt.value = i + 1;
            opt.textContent = m;
            if (i === now.getMonth()) opt.selected = true;
            selMonth.appendChild(opt);
        });

        for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            selYear.appendChild(opt);
        }

        selMonth.addEventListener('change', loadLogs);
        selYear.addEventListener('change', loadLogs);

        // ===================
        // LOAD LOGS
        // ===================
        async function loadLogs() {
            const month = selMonth.value;
            const year = selYear.value;
            const container = document.getElementById('logs-list');
            container.innerHTML = '<div class="empty-log-state"><p>Cargando registros...</p></div>';

            const res = await ApiClient.request(`/security/entry_logs?month=${month}&year=${year}`, 'GET');

            if (!res || res.status !== 'success' || res.data.length === 0) {
                container.innerHTML = `
                    <div class="empty-log-state">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                        <p>No hay registros para ${monthNames[month-1]} ${year}</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            res.data.forEach(entry => renderLogCard(container, entry));
        }

        function getPhotoUrl(path) {
            if (!path) return '';
            const filename = path.split('/').pop();
            return CONFIG.API_URL + '/security/photo/' + filename;
        }

        function timeAgo(dateStr) {
            const diffMs = new Date() - new Date(dateStr);
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'ahora';
            if (diffMin < 60) return `hace ${diffMin}min`;
            const h = Math.floor(diffMin / 60);
            if (h < 24) return `hace ~${h}h`;
            return `hace ${Math.floor(h/24)}d`;
        }

        function calcDuration(entry, exit) {
            if (!exit) return '';
            const diffMs = new Date(exit) - new Date(entry);
            const mins = Math.floor(diffMs / 60000);
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        function renderLogCard(container, entry) {
            const entryTime = entry.entry_time ? entry.entry_time.substring(11, 16) : '--:--';
            const exitTime = entry.exit_time ? entry.exit_time.substring(11, 16) : null;
            const ago = entry.entry_time ? timeAgo(entry.entry_time) : '';
            const duration = entry.exit_time ? calcDuration(entry.entry_time, entry.exit_time) : '';
            const photoSrc = entry.photo_url ? getPhotoUrl(entry.photo_url) : '';
            const vehicleType = entry.vehicle_type || '';
            const visitType = entry.visit_type || 'Visita';
            const hasExit = !!entry.exit_time;

            const card = document.createElement('div');
            card.className = 'log-card' + (hasExit ? '' : ' no-exit');
            card.onclick = () => openLogDetail(entry.id);

            let vehicleLine = '';
            if (vehicleType && vehicleType !== 'none') {
                vehicleLine = `
                    <div class="vehicle-line">
                        <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                        ${vehicleType}
                    </div>`;
            }

            card.innerHTML = `
                <div class="log-card-body">
                    <div class="name">° ${entry.visitor_name}</div>
                    ${vehicleLine}
                    <div class="unit">${entry.unit_number || 'N/A'}</div>
                    <div class="times">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span class="entry-time">Entrada: ${entryTime}</span>
                        ${exitTime ? `<span>Salida: <span class="exit-time">${exitTime}</span></span>` : '<span style="color:#f59e0b; font-weight:600;">En sitio</span>'}
                    </div>
                    <div class="times" style="margin-top:2px;">
                        <span class="ago">${ago}</span>
                        ${duration ? `<span class="duration"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${duration}</span>` : ''}
                    </div>
                </div>
                <div class="log-card-right">
                    ${photoSrc ? `<img class="thumb" src="${photoSrc}" alt="Foto">` : ''}
                    <span class="visit-badge">${visitType}</span>
                </div>
            `;

            container.appendChild(card);
        }

        // ===================
        // DETAIL VIEW
        // ===================
        async function openLogDetail(entryId) {
            const res = await ApiClient.request(`/security/visitor_detail/${entryId}`, 'GET');
            if (!res || res.status !== 'success') {
                alert('No se pudo cargar el detalle.');
                return;
            }

            const v = res.data;
            const overlay = document.getElementById('logDetailOverlay');
            const body = document.getElementById('logDetailBody');

            const photoIdSrc = v.photo_url ? getPhotoUrl(v.photo_url) : '';
            const photoPlateSrc = v.photo_plate_url ? getPhotoUrl(v.photo_plate_url) : '';
            const visitType = v.visit_type || 'Visita';
            const vehicleType = v.vehicle_type || '';
            const entryTimeStr = v.entry_time ? formatTimeDetail(v.entry_time) : '--';
            const exitTimeStr = v.exit_time ? formatTimeDetail(v.exit_time) : null;

            let html = `
                <div class="log-detail-card">
                    <div class="card-title">Detalles del Visitante</div>
                    <div class="ld-row">
                        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#64748b;stroke-width:2.5;"><circle cx="12" cy="12" r="3"></circle></svg>
                        <span class="ld-label">Nombre</span>
                        <span class="ld-value">${v.visitor_name}</span>
                    </div>
                    <div class="ld-row">
                        <span class="ld-label" style="margin-left:26px;">Unidad</span>
                        <span class="ld-value">${v.unit_number || 'N/A'}</span>
                    </div>
                    <div class="ld-row">
                        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#22c55e;stroke-width:3;"><line x1="6" y1="12" x2="18" y2="12"></line></svg>
                        <span class="ld-label">Hora de entrada</span>
                        <span class="ld-value">${entryTimeStr}</span>
                    </div>
                    <div class="ld-row">
                        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#ef4444;stroke-width:3;stroke-dasharray:4;"><line x1="6" y1="12" x2="18" y2="12"></line></svg>
                        <span class="ld-label">Hora de salida</span>
                        <span class="ld-value">${exitTimeStr || '<span style="color:#f59e0b;">En sitio</span>'}</span>
                    </div>
                    <div class="ld-row">
                        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#3b82f6;stroke-width:2.5;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        <span class="ld-label">Propósito</span>
                        <span class="ld-value pill">${visitType}</span>
                    </div>
                </div>
            `;

            if (photoPlateSrc) {
                html += `
                <div class="ld-photo-section">
                    <div class="ld-photo-label">
                        <span class="left">
                            <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"></circle><circle cx="19" cy="12" r="1.5"></circle><line x1="8" y1="12" x2="16" y2="12" stroke-dasharray="2"></line></svg>
                            Placa
                        </span>
                        <span class="right">${vehicleType || 'Auto'}</span>
                    </div>
                    <img src="${photoPlateSrc}" alt="Placa del vehículo">
                </div>`;
            }

            if (photoIdSrc) {
                html += `
                <div class="ld-photo-section">
                    <div class="ld-photo-label">
                        <span class="left">
                            <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"></circle><circle cx="19" cy="12" r="1.5"></circle><line x1="8" y1="12" x2="16" y2="12" stroke-dasharray="2"></line></svg>
                            Identificación
                        </span>
                    </div>
                    <img src="${photoIdSrc}" alt="ID del visitante">
                </div>`;
            }

            const photoExitSrc = v.photo_exit_url ? getPhotoUrl(v.photo_exit_url) : '';
            if (photoExitSrc) {
                html += `
                <div class="ld-photo-section" style="border-left: 3px solid #ef4444;">
                    <div class="ld-photo-label">
                        <span class="left">
                            <svg viewBox="0 0 24 24" style="stroke:#ef4444;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                            Evidencia de Salida
                        </span>
                        <span class="right" style="background:#fef2f2; color:#ef4444;">Salida</span>
                    </div>
                    <img src="${photoExitSrc}" alt="Evidencia de salida">
                </div>`;
            }

            body.innerHTML = html;
            overlay.classList.add('active');
            document.getElementById('bottomNav').style.display = 'none';
        }

        function formatTimeDetail(dateStr) {
            if (!dateStr) return '--';
            const d = new Date(dateStr);
            const today = new Date();
            const isToday = d.toDateString() === today.toDateString();
            const time = dateStr.substring(11, 16);
            return isToday ? `Hoy ${time}` : `${d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' })} ${time}`;
        }

        function closeLogDetail() {
            document.getElementById('logDetailOverlay').classList.remove('active');
            document.getElementById('bottomNav').style.display = 'flex';
        }

        window.onload = () => {
            loadLogs();

            // Mostrar toast si viene de un registro de salida completado
            if (sessionStorage.getItem('toast_exit_registered')) {
                sessionStorage.removeItem('toast_exit_registered');
                const toast = document.getElementById('toast-log');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        };
    </script>
</body>
</html>
